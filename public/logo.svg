<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" fill="none">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur stdDeviation="1.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232B3E"/>
      <stop offset="100%" stop-color="#151A28"/>
    </linearGradient>
  </defs>

  <!-- ── Icon box ── -->
  <rect x="2" y="2" width="116" height="116" rx="28" fill="url(#bgGrad)"/>
  <rect x="2" y="2" width="116" height="116" rx="28" stroke="#2D3A52" stroke-width="1.5" fill="none"/>

  <!-- ── Буква M (классическая, неоново-зелёная) ── -->
  <g filter="url(#neonGlow)">
    <path
      d="M24 86 L24 34 L60 66 L96 34 L96 86"
      stroke="#2DC96A"
      stroke-width="7.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- ── Text: "Mushebi" тёмный + ".ge" зелёный ── -->
  <text
    x="136" y="63"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="48"
    fill="#1A1F2E"
    letter-spacing="-1.5"
  >Mushebi</text>
  <text
    x="356" y="63"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="48"
    fill="#2DC96A"
    letter-spacing="-1.5"
  >.ge</text>

  <!-- ── Tagline ── -->
  <text
    x="138" y="95"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#9CA3AF"
    letter-spacing="0.5"
  >პრემიუმ სერვისი</text>
</svg>
